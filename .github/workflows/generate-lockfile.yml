name: Generate package lock

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - package.json
      - .npmrc
      - .github/workflows/generate-lockfile.yml

permissions:
  contents: write

jobs:
  generate-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit lockfile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain package-lock.json)" ]; then
            echo "package-lock.json already up to date"
          else
            git add package-lock.json
            git commit -m "chore: generate package lock"
            git push
          fi

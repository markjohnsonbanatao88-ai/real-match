name: Generate package lock

# Triggered by repository changes or manual workflow dispatch.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - package.json
      - .github/workflows/generate-lockfile.yml

permissions:
  contents: write

jobs:
  generate-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate lockfile
        run: npm install --package-lock-only

      - name: Commit lockfile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json already up to date"
          else
            git add package-lock.json
            git commit -m "chore: generate package lock"
            git push
          fi
